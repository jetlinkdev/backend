# Config file for Air

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Array of commands to run before each build
  pre_cmd = []
  
  # Just plain old shell command. You could use 'make' as well
  cmd = "go build -o ./tmp/main cmd/server/main.go"
  
  # Binary file yields from 'cmd', will be deprecated soon, recommend using entrypoint
  bin = "./tmp/main"
  
  # Customize binary, can setup environment variables when run your app
  full_bin = "APP_ENV=dev APP_USER=air ./tmp/main"
  
  # Watch these filename extensions
  include_ext = ["go", "tpl", "tmpl", "html", "mod", "sum"]
  
  # Ignore these filename extensions or directories
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", ".git"]
  
  # Exclude specific regular expressions
  exclude_regex = ["_test.go"]
  
  # Exclude unchanged files
  exclude_unchanged = false
  
  # Follow symlink for directories
  follow_symlink = false
  
  # Delay after each execution
  rerun_delay = 500
  
  # Rerun binary or not
  rerun = false

  # Delay after sending Interrupt signal
  kill_delay = "0s"

  # It's not necessary to trigger build each time file changes if it's too frequent
  delay = 1000

  # Stop running old binary when build errors occur
  stop_on_error = true

  # Send Interrupt signal before killing process (ignored on Windows; uses TASKKILL)
  send_interrupt = false

  # Valid options: "auto", "always", "never"
  color = "auto"

  # Add additional arguments when running binary (bin/full_bin).
  args_bin = []

[log]
  # Show log time
  time = false

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

[screen]
  # Clear screen on rebuild
  clear_on_rebuild = false
  # Keep scroll position after rebuild
  keep_scroll = true